<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        canvas { display: block; }
        #transcription-box {
            position: absolute; bottom: -150px; right: 50px; width: 320px;
            max-height: 400px;
            background: rgba(15, 15, 20, 0.9); border: 1px solid #00ffcc;
            border-radius: 12px; padding: 15px; color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 14px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        opacity 0.3s ease-in-out,
                        max-height 0.3s ease-in-out,
                        background-color 0.3s ease-in-out;
            z-index: 10;
            overflow-y: auto;
        }
        #transcription-box.visible { bottom: 40px; }
        #transcription-box.hiding {
            opacity: 0;
            max-height: 0;
            padding: 0;
            margin: 0;
            visibility: hidden;
        }
        #transcription-box.error-flash {
            background-color: rgba(255, 0, 0, 0.3);
            border-color: rgba(255, 0, 0, 0.8);
        }
        #transcription-status, #transcription-text, #volume-meter {
            transition: opacity 0.3s ease-in-out;
        }
        #chat-content {
            transition: opacity 0.3s ease-in-out;
        }
        .fade-out {
            opacity: 0;
        }
        .fade-in {
            opacity: 1;
        }
        #transcription-box::-webkit-scrollbar {
            width: 6px;
        }
        #transcription-box::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        #transcription-box::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 204, 0.5);
            border-radius: 3px;
        }
        #transcription-status.blinking {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        #volume-meter {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        #volume-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff66, #00ffcc, #ffcc00, #ff6666);
            transition: width 0.1s ease-out;
            border-radius: 4px;
        }
        #ready-notification {
            position: absolute; bottom: -150px; right: 50px; width: 320px;
            background: rgba(15, 15, 20, 0.9); border: 1px solid #00ff66;
            border-radius: 12px; padding: 15px; color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 14px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        #ready-notification.visible { bottom: 40px; }
        .typing-indicator { color: #00ffcc; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.155.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.155.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
            }
        }
    </script>

    <script>
        window.avatarState = "hidden";
        let boxTimeout = null; // Guardamos el timer de la caja aquí
        console.log("🎭 [WEB] Sistema de avatar inicializado, estado:", window.avatarState);
        
        window.toggleRecordingUI = (isRecording) => {
            console.log("🎭 [WEB] toggleRecordingUI llamado con:", isRecording);
            const transBox = document.getElementById('transcription-box');
            if (!transBox) {
                console.error("🎭 [WEB] ERROR: transcription-box no encontrado");
                return;
            }
            
            clearTimeout(boxTimeout); // Cancelamos cualquier cierre pendiente si volvés a tocar la tecla
            
            if (isRecording) {
                console.log("🎭 [WEB] Mostrando UI de grabación (Escuchando...)");
                // Resetear estilos inline que puedan estar ocultando la caja
                transBox.style.visibility = 'visible';
                transBox.style.opacity = '1';
                transBox.classList.remove('hiding');
                transBox.classList.add('visible');
                
                // Asegurar que los elementos de transcripción estén visibles
                const transStatus = document.getElementById('transcription-status');
                const transText = document.getElementById('transcription-text');
                const volumeMeter = document.getElementById('volume-meter');
                const chatContent = document.getElementById('chat-content');
                
                transStatus.style.display = 'inline';
                transText.style.display = 'block';
                volumeMeter.style.display = 'block';
                chatContent.style.display = 'none';
                
                transStatus.style.opacity = '1';
                transText.style.opacity = '1';
                volumeMeter.style.opacity = '1';
                
                transStatus.classList.remove('fade-out', 'fade-in');
                transText.classList.remove('fade-out', 'fade-in');
                volumeMeter.classList.remove('fade-out', 'fade-in');
                
                document.getElementById('transcription-status').innerHTML = "🎙️ Escuchando";
                document.getElementById('transcription-status').classList.remove('blinking');
                document.getElementById('transcription-text').innerHTML = "...";
            } else {
                console.log("🎭 [WEB] Cambiando a estado Procesando");
                // Cambiar texto de estado a Procesando con efecto de intermitencia
                document.getElementById('transcription-status').innerHTML = "🎙️ Procesando";
                document.getElementById('transcription-status').classList.add('blinking');
                // Mantener texto de transcripción actual pero quitar cursor caret
                const transText = document.getElementById('transcription-text');
                transText.innerHTML = transText.innerHTML.replace('<span class="typing-indicator">|</span>', '');
                console.log("🎭 [WEB] Estado cambiado a Procesando con intermitencia, caret removido");
            }
        };

        window.hideRecordingUI = () => {
            console.log("🎭 [WEB] hideRecordingUI llamado - ocultando caja sin cambiar texto");
            const transBox = document.getElementById('transcription-box');
            if (transBox) {
                transBox.classList.remove('visible');
            }
        };

        window.updateTranscription = (text) => {
            console.log("🎭 [WEB] updateTranscription llamado con:", text);
            const transText = document.getElementById('transcription-text');
            if (transText) {
                // Para transcripción final, sin cursor caret
                transText.innerHTML = text;
            } else {
                console.error("🎭 [WEB] ERROR: Elemento transcription-text no encontrado");
            }
        };

        window.updateLiveTranscription = (text) => {
            console.log("🎭 [WEB] updateLiveTranscription llamado con:", text);
            const transText = document.getElementById('transcription-text');
            if (transText) {
                // Para transcripción en tiempo real, con cursor caret
                transText.innerHTML = text + " <span class='typing-indicator'>|</span>";
            } else {
                console.error("🎭 [WEB] ERROR: Elemento transcription-text no encontrado");
            }
        };

        window.transitionToChatMode = (userName, userText) => {
            console.log("🎭 [WEB] transitionToChatMode llamado con:", userName, userText);
            const transBox = document.getElementById('transcription-box');
            const transStatus = document.getElementById('transcription-status');
            const transText = document.getElementById('transcription-text');
            const volumeMeter = document.getElementById('volume-meter');
            const chatContent = document.getElementById('chat-content');
            const userNameEl = document.getElementById('user-name');
            const userTextEl = document.getElementById('user-text');
            const assistantNameEl = document.getElementById('assistant-name');
            
            if (!transBox || !chatContent) {
                console.error("🎭 [WEB] ERROR: Elementos de chat no encontrados");
                return;
            }
            
            // Configurar información del usuario y asistente primero
            userNameEl.innerHTML = userName;
            userTextEl.innerHTML = userText;
            assistantNameEl.innerHTML = window.avatarName || "Asistente";
            
            // Animación de fade out para elementos de transcripción
            transStatus.classList.add('fade-out');
            transText.classList.add('fade-out');
            volumeMeter.classList.add('fade-out');
            
            // Después del fade out, ocultar elementos y mostrar chat con fade in
            setTimeout(() => {
                transStatus.style.display = 'none';
                transText.style.display = 'none';
                volumeMeter.style.display = 'none';
                
                chatContent.style.display = 'block';
                chatContent.classList.add('fade-out');
                
                // Pequeño delay para que el fade in funcione correctamente
                setTimeout(() => {
                    chatContent.classList.remove('fade-out');
                    chatContent.classList.add('fade-in');
                }, 50);
            }, 300);
            
            console.log("🎭 [WEB] Transición a modo chat iniciada con animación");
        };

        window.showAssistantResponse = (response, isFallback = false) => {
            console.log("🎭 [WEB] showAssistantResponse llamado con:", response, "isFallback:", isFallback);
            const assistantTextEl = document.getElementById('assistant-text');
            if (assistantTextEl) {
                if (isFallback) {
                    // Efecto de máquina de escribir por palabra para fallbacks
                    const words = response.split(' ');
                    assistantTextEl.innerHTML = '';
                    let wordIndex = 0;
                    
                    function typeWord() {
                        if (wordIndex < words.length) {
                            assistantTextEl.innerHTML += (wordIndex > 0 ? ' ' : '') + words[wordIndex];
                            wordIndex++;
                            setTimeout(typeWord, 100); // 100ms entre palabras
                        }
                    }
                    typeWord();
                } else {
                    // Mostrar respuesta normal inmediatamente
                    assistantTextEl.innerHTML = response;
                }
                console.log("🎭 [WEB] Respuesta de asistente mostrada");
            } else {
                console.error("🎭 [WEB] ERROR: Elemento assistant-text no encontrado");
            }
        };

        window.hideChat = () => {
            console.log("🎭 [WEB] hideChat llamado - ocultando caja de chat con animación");
            const transBox = document.getElementById('transcription-box');
            if (transBox) {
                // Primero agregar clase hiding para animación
                transBox.classList.add('hiding');
                // Después de la animación, quitar visible y asegurar invisibilidad
                setTimeout(() => {
                    transBox.classList.remove('visible');
                    transBox.classList.remove('hiding');
                    // Asegurar invisibilidad completa por seguridad
                    transBox.style.visibility = 'hidden';
                    transBox.style.opacity = '0';
                }, 300);
            }
        };

        window.flashError = () => {
            console.log("🎭 [WEB] flashError llamado - mostrando flash rojo en caja");
            const transBox = document.getElementById('transcription-box');
            if (transBox) {
                transBox.classList.add('error-flash');
                setTimeout(() => {
                    transBox.classList.remove('error-flash');
                }, 1000);
            }
        };

        window.apuntarFalso = () => {
            console.log("🎭 [WEB] apuntarFalso llamado");
        };
        window.setAvatarPath = (path) => {
            console.log("🎭 [WEB] setAvatarPath llamado con:", path);
            window.avatarPath = path;
        };
        window.setAvatarName = (name) => {
            console.log("🎭 [WEB] setAvatarName llamado con:", name);
            window.avatarName = name;
            const nameEl = document.getElementById('avatar-name');
            if (nameEl) {
                nameEl.textContent = name;
            }
        };
        window.setHotkey = (hotkey) => {
            console.log("🎭 [WEB] setHotkey llamado con:", hotkey);
            window.hotkey = hotkey;
            const hotkeyEl = document.getElementById('hotkey-text');
            if (hotkeyEl) {
                hotkeyEl.textContent = hotkey;
            }
        };
        window.startSpeaking = (text, duration) => {
            console.log("🎭 [WEB] startSpeaking llamado con:", text, "duración:", duration);
            window.speakingText = text;
            window.speakingStartTime = Date.now();
            window.speakingDuration = duration * 1000; // Convertir a milisegundos
            window.charDuration = window.speakingDuration / text.length; // ms por carácter
        };
        window.getVisemeForChar = (char) => {
            const vowelBlendshapes = {
                'a': 'aa', 'á': 'aa', 'à': 'aa', 'ä': 'aa',
                'e': 'e', 'é': 'e', 'è': 'e', 'ë': 'e',
                'i': 'ih', 'í': 'ih', 'ì': 'ih', 'ï': 'ih',
                'o': 'oh', 'ó': 'oh', 'ò': 'oh', 'ö': 'oh',
                'u': 'ou', 'ú': 'ou', 'ù': 'ou', 'ü': 'ou',
            };
            return vowelBlendshapes[char.toLowerCase()] || null; // Consonantes = null (cerrar boca)
        };
        window.hideReadyNotification = () => {
            const notif = document.getElementById('ready-notification');
            if (notif) {
                notif.classList.remove('visible');
                console.log("🎭 [WEB] Notificación ocultada manualmente");
            }
            // Cancelar el timer si existe
            if (window.readyNotificationTimer) {
                clearTimeout(window.readyNotificationTimer);
                console.log("🎭 [WEB] Timer cancelado");
            }
        };
        
        window.updateVolumeMeter = (level) => {
            const volumeBar = document.getElementById('volume-bar');
            if (volumeBar) {
                // Level es un valor entre 0 y 1
                const percentage = Math.min(Math.max(level * 100, 0), 100);
                volumeBar.style.width = percentage + '%';
                
                // Cambiar color según nivel
                if (percentage < 30) {
                    volumeBar.style.background = '#00ff66';
                } else if (percentage < 60) {
                    volumeBar.style.background = '#00ffcc';
                } else if (percentage < 80) {
                    volumeBar.style.background = '#ffcc00';
                } else {
                    volumeBar.style.background = '#ff6666';
                }
            }
        };
    </script>
</head>
<body>
    <div id="transcription-box">
        <span id="transcription-status" style="color: #888; font-size: 12px; text-transform: uppercase;">🎙️ Escuchando</span>
        <div id="transcription-text" style="margin-top: 8px;">...</div>
        <div id="volume-meter">
            <div id="volume-bar"></div>
        </div>
        <div id="chat-content" style="display: none;">
            <div id="user-section">
                <span id="user-name" style="color: #888; font-size: 12px; text-transform: uppercase;"></span>
                <div id="user-text" style="margin-top: 8px;"></div>
            </div>
            <hr id="chat-divider" style="border: 0; border-top: 1px solid #444; margin: 12px 0;">
            <div id="assistant-section">
                <span id="assistant-name" style="color: #888; font-size: 12px; text-transform: uppercase;"></span>
                <div id="assistant-text" style="margin-top: 8px;"></div>
            </div>
        </div>
    </div>
    <div id="ready-notification">
        <span style="color: #fff; font-size: 16px; font-weight: bold;">✅ Sistema Listo</span>
        <div style="margin-top: 8px; color: #eee;">Presiona <span id="hotkey-text">Alt+R</span> para hablar con <span id="avatar-name">Kurumi</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        console.log("🎭 [WEB] Módulos ES6 cargados correctamente");
        document.addEventListener('contextmenu', event => event.preventDefault());

        const scene = new THREE.Scene();
        const cameraZ = 5.0; 
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, cameraZ);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); 
        renderer.outputColorSpace = THREE.SRGBColorSpace; 
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        let currentVrm = null;
        let avatarTargetY = 0; 
        let avatarBaseY = 0;
        let hideTimeout = null;

        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));
        
        // Usar el path del avatar configurado o fallback a avatar.vrm
        const avatarPath = window.avatarPath || './avatar.vrm';
        console.log("🎭 [WEB] Loader configurado, cargando avatar:", avatarPath);
        
        loader.load(avatarPath, (gltf) => {
            console.log("🎭 [WEB] Avatar VRM cargado exitosamente");
            currentVrm = gltf.userData.vrm;
            scene.add(currentVrm.scene);
            
            // Mostrar notificación de sistema listo
            const notif = document.getElementById('ready-notification');
            if (notif) {
                notif.classList.add('visible');
                console.log("🎭 [WEB] Notificación mostrada, timer de 5s iniciado");
                // Ocultar después de 5 segundos
                window.readyNotificationTimer = setTimeout(() => {
                    console.log("🎭 [WEB] Timer ejecutado, ocultando notificación");
                    if (notif.classList.contains('visible')) {
                        notif.classList.remove('visible');
                    }
                }, 5000);
            }
            
            // Notificar a Python que el sistema está listo
            window.systemReady = true;
            
            const rotY = 2.80;
            const offsetY = 1.15;
            currentVrm.scene.rotation.y = rotY;
            
            const fovRad = THREE.MathUtils.degToRad(camera.fov);
            const visibleHeight = 2 * Math.tan(fovRad / 2) * cameraZ;
            const visibleWidth = visibleHeight * (window.innerWidth / window.innerHeight);
            const frustumDiagonal = Math.sqrt(Math.pow(visibleWidth, 2) + Math.pow(visibleHeight, 2));
            const finalScale = (frustumDiagonal / 0.7) * 0.65;
            currentVrm.scene.scale.set(finalScale, finalScale, finalScale);
            
            const posX = (visibleWidth / 2) - (0.1 * finalScale);
            avatarBaseY = (-visibleHeight / 2) - (offsetY * finalScale);
            avatarTargetY = avatarBaseY; 
            currentVrm.scene.position.set(posX, avatarTargetY, 0);

            window.setAvatarState(window.avatarState);
            
            // SETUP DE POSE DE DESCANSO (bajar brazos desde T-pose)
            const degToRad = THREE.MathUtils.degToRad;
            
            // Guardar valores base de rotación para brazos
            window.leftArmBaseZ = degToRad(75);
            window.rightArmBaseZ = degToRad(-75);
            
            // Bajar brazos a pose relajada
            if (currentVrm.humanoid.getNormalizedBoneNode('leftUpperArm')) {
                const leftUpperArm = currentVrm.humanoid.getNormalizedBoneNode('leftUpperArm');
                leftUpperArm.rotation.z = window.leftArmBaseZ;
            }
            if (currentVrm.humanoid.getNormalizedBoneNode('rightUpperArm')) {
                const rightUpperArm = currentVrm.humanoid.getNormalizedBoneNode('rightUpperArm');
                rightUpperArm.rotation.z = window.rightArmBaseZ;
            }
            
            // Flexionar codos (15-20° en Y)
            if (currentVrm.humanoid.getNormalizedBoneNode('leftLowerArm')) {
                const leftLowerArm = currentVrm.humanoid.getNormalizedBoneNode('leftLowerArm');
                leftLowerArm.rotation.y = degToRad(17);
            }
            if (currentVrm.humanoid.getNormalizedBoneNode('rightLowerArm')) {
                const rightLowerArm = currentVrm.humanoid.getNormalizedBoneNode('rightLowerArm');
                rightLowerArm.rotation.y = degToRad(-17);
            }
            
            // Rotar hombros (5° adelante Y, -3° abajo Z)
            if (currentVrm.humanoid.getNormalizedBoneNode('leftShoulder')) {
                const leftShoulder = currentVrm.humanoid.getNormalizedBoneNode('leftShoulder');
                leftShoulder.rotation.y = degToRad(5);
                leftShoulder.rotation.z = degToRad(-3);
            }
            if (currentVrm.humanoid.getNormalizedBoneNode('rightShoulder')) {
                const rightShoulder = currentVrm.humanoid.getNormalizedBoneNode('rightShoulder');
                rightShoulder.rotation.y = degToRad(-5);
                rightShoulder.rotation.z = degToRad(3);
            }
            
            // Inicializar variables para animación procedimental
            window.idleTime = 0;
            window.spineSwayX = 0;
            window.spineSwayZ = 0;
            window.lastSwayX = 0;
            window.lastSwayZ = 0;
            window.leftArmLag = 0;
            window.rightArmLag = 0;
            window.nextSaccadeTime = Date.now() + Math.random() * 2500 + 1500;
            window.nextBlinkTime = Date.now() + Math.random() * 3500 + 2500;
            window.blinkState = 0; // 0 = abierto, 1 = cerrando, 2 = abriendo
            window.blinkValue = 0;
            
            console.log("🎭 [WEB] Pose de descanso configurada");
        }, undefined, (error) => {
            console.error("🎭 [WEB] ERROR cargando avatar VRM:", error);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) {
                const currentY = currentVrm.scene.position.y;
                window.idleTime += delta;
                const degToRad = THREE.MathUtils.degToRad;
                
                // Recalcular visibleWidth y finalScale para el loop
                const fovRad = THREE.MathUtils.degToRad(camera.fov);
                const visibleHeight = 2 * Math.tan(fovRad / 2) * cameraZ;
                const visibleWidth = visibleHeight * (window.innerWidth / window.innerHeight);
                const frustumDiagonal = Math.sqrt(Math.pow(visibleWidth, 2) + Math.pow(visibleHeight, 2));
                const finalScale = (frustumDiagonal / 0.7) * 0.65;
                
                // LOOP DE ANIMACIÓN PROCEDIMENTAL (Idle Activo)
                
                // 1. Respiración (~0.25 Hz) - Chest y UpperChest en X
                const breathFreq = 0.25;
                const breathAmp = degToRad(0.8);
                const breathValue = Math.sin(window.idleTime * breathFreq * Math.PI * 2) * breathAmp;
                
                if (currentVrm.humanoid.getNormalizedBoneNode('chest')) {
                    const chest = currentVrm.humanoid.getNormalizedBoneNode('chest');
                    chest.rotation.x = breathValue;
                }
                if (currentVrm.humanoid.getNormalizedBoneNode('upperChest')) {
                    const upperChest = currentVrm.humanoid.getNormalizedBoneNode('upperChest');
                    upperChest.rotation.x = breathValue * 0.8;
                }
                
                // Hombros con desfase en Z
                if (currentVrm.humanoid.getNormalizedBoneNode('leftShoulder')) {
                    const leftShoulder = currentVrm.humanoid.getNormalizedBoneNode('leftShoulder');
                    leftShoulder.rotation.z = degToRad(-3) + breathValue * 0.3;
                }
                if (currentVrm.humanoid.getNormalizedBoneNode('rightShoulder')) {
                    const rightShoulder = currentVrm.humanoid.getNormalizedBoneNode('rightShoulder');
                    rightShoulder.rotation.z = degToRad(3) - breathValue * 0.3;
                }
                
                // 2. Tambaleo (Standing Sway ~0.1 Hz) - Spine en X y Z
                const swayFreq = 0.1;
                const swayAmp = degToRad(1.5);
                // Suma de senos desfasados para simular Perlin noise
                const swayX = (Math.sin(window.idleTime * swayFreq * Math.PI * 2) + 
                              Math.sin(window.idleTime * swayFreq * 0.7 * Math.PI * 2) * 0.5) * swayAmp;
                const swayZ = (Math.sin(window.idleTime * swayFreq * Math.PI * 2 + 1) + 
                              Math.sin(window.idleTime * swayFreq * 0.6 * Math.PI * 2 + 1) * 0.5) * swayAmp;
                
                window.spineSwayX = swayX;
                window.spineSwayZ = swayZ;
                
                if (currentVrm.humanoid.getNormalizedBoneNode('spine')) {
                    const spine = currentVrm.humanoid.getNormalizedBoneNode('spine');
                    spine.rotation.x = swayX;
                    spine.rotation.z = swayZ;
                }
                
                // Traslación global sutil en sintonía con balanceo (solo si no está oculto)
                const posOffsetX = swayX * 0.02;
                const posOffsetY = swayZ * 0.01;
                currentVrm.scene.position.x = (visibleWidth / 2) - (0.1 * finalScale) + posOffsetX;
                
                // Interpolación suave de posición Y (transición suave al ocultar/mostrar)
                if (window.avatarState !== "hidden") {
                    // Aplicar tambaleo en Y cuando está visible
                    const targetY = avatarBaseY + posOffsetY;
                    currentVrm.scene.position.y += (targetY - currentVrm.scene.position.y) * 10 * delta;
                } else {
                    // Interpolar hacia posición oculta
                    currentVrm.scene.position.y += (avatarTargetY - currentVrm.scene.position.y) * 10 * delta;
                }
                
                // 3. Inercia en Brazos (Sway Lag) - delay de 0.2s
                const armLagFactor = 0.2;
                window.leftArmLag += (swayX - window.leftArmLag) * armLagFactor * delta * 5;
                window.rightArmLag += (swayX - window.rightArmLag) * armLagFactor * delta * 5;
                
                // Aplicar rotación base + sway lag (usar valores guardados del setup)
                if (currentVrm.humanoid.getNormalizedBoneNode('leftUpperArm')) {
                    const leftUpperArm = currentVrm.humanoid.getNormalizedBoneNode('leftUpperArm');
                    leftUpperArm.rotation.z = window.leftArmBaseZ - window.leftArmLag * 0.5;
                }
                if (currentVrm.humanoid.getNormalizedBoneNode('rightUpperArm')) {
                    const rightUpperArm = currentVrm.humanoid.getNormalizedBoneNode('rightUpperArm');
                    rightUpperArm.rotation.z = window.rightArmBaseZ + window.rightArmLag * 0.5;
                }
                
                // 4. Compensación de Cabeza - 60% del ángulo de Spine en sentido opuesto
                if (currentVrm.humanoid.getNormalizedBoneNode('head')) {
                    const head = currentVrm.humanoid.getNormalizedBoneNode('head');
                    head.rotation.x = -swayX * 0.6;
                    head.rotation.z = -swayZ * 0.6;
                }
                
                // 5. Saccades de Ojos - movimientos rápidos aleatorios
                const now = Date.now();
                if (now > window.nextSaccadeTime) {
                    // Movimiento rápido a target aleatorio
                    const saccadeX = (Math.random() - 0.5) * 0.3;
                    const saccadeY = (Math.random() - 0.5) * 0.2;
                    
                    if (currentVrm.humanoid.getNormalizedBoneNode('leftEye')) {
                        const leftEye = currentVrm.humanoid.getNormalizedBoneNode('leftEye');
                        leftEye.rotation.y = saccadeX;
                        leftEye.rotation.x = saccadeY;
                    }
                    if (currentVrm.humanoid.getNormalizedBoneNode('rightEye')) {
                        const rightEye = currentVrm.humanoid.getNormalizedBoneNode('rightEye');
                        rightEye.rotation.y = saccadeX;
                        rightEye.rotation.x = saccadeY;
                    }
                    
                    // Próximo saccade en 1.5s - 4s
                    window.nextSaccadeTime = now + Math.random() * 2500 + 1500;
                }
                
                // 6. Parpadeo Procedural
                if (now > window.nextBlinkTime) {
                    window.blinkState = 1; // Empezar a cerrar
                    window.nextBlinkTime = now + Math.random() * 3500 + 2500;
                    
                    // 15% de chance de doble parpadeo
                    if (Math.random() < 0.15) {
                        window.doubleBlink = true;
                    } else {
                        window.doubleBlink = false;
                    }
                }
                
                // Procesar parpadeo
                if (window.blinkState === 1) {
                    // Cerrando (0.08s)
                    window.blinkValue += delta * 12.5;
                    if (window.blinkValue >= 1) {
                        window.blinkValue = 1;
                        window.blinkState = 2;
                        window.blinkTimer = now;
                    }
                } else if (window.blinkState === 2) {
                    // Abriendo (0.15s)
                    window.blinkValue -= delta * 6.67;
                    if (window.blinkValue <= 0) {
                        window.blinkValue = 0;
                        window.blinkState = 0;
                        
                        // Doble parpadeo
                        if (window.doubleBlink) {
                            window.doubleBlink = false;
                            window.blinkState = 1;
                        }
                    }
                }
                
                // Aplicar parpadeo al blendshape
                currentVrm.expressionManager.setValue('blink', window.blinkValue);
                
                currentVrm.update(delta);

                if (window.avatarState === "speaking") {
                    // Usar visemes basados en texto si está disponible
                    if (window.speakingText && window.speakingText.length > 0 && window.charDuration) {
                        const elapsed = Date.now() - window.speakingStartTime;
                        // Usar duración calculada dinámicamente
                        const newCharIndex = Math.floor(elapsed / window.charDuration);
                        
                        if (newCharIndex < window.speakingText.length) {
                            const char = window.speakingText[newCharIndex];
                            const blendshape = window.getVisemeForChar(char);
                            
                            // Lista de blendshapes vocales VRM
                            const vowelBlendshapes = ['aa', 'ih', 'ou', 'e', 'oh'];
                            
                            if (blendshape) {
                                // Activar el blendshape correspondiente
                                let currentValue = currentVrm.expressionManager.getValue(blendshape) || 0;
                                currentVrm.expressionManager.setValue(blendshape, currentValue + (1.0 - currentValue) * 15 * delta);
                                
                                // Desactivar otros blendshapes vocales
                                for (const bs of vowelBlendshapes) {
                                    if (bs !== blendshape) {
                                        let otherValue = currentVrm.expressionManager.getValue(bs) || 0;
                                        currentVrm.expressionManager.setValue(bs, otherValue * (1 - 15 * delta));
                                    }
                                }
                            } else {
                                // Consonante: desactivar todos los blendshapes vocales
                                for (const bs of vowelBlendshapes) {
                                    let value = currentVrm.expressionManager.getValue(bs) || 0;
                                    currentVrm.expressionManager.setValue(bs, value * (1 - 15 * delta));
                                }
                            }
                        } else {
                            // Se acabó el texto, cerrar boca
                            const vowelBlendshapes = ['aa', 'ih', 'ou', 'e', 'oh'];
                            for (const bs of vowelBlendshapes) {
                                currentVrm.expressionManager.setValue(bs, 0);
                            }
                        }
                    } else {
                        // Fallback a animación sinusoidal
                        let timeNow = Date.now() * 0.015;
                        let mouthOpen = (Math.sin(timeNow) * 0.5 + 0.5) * 0.8;
                        let currentMouth = currentVrm.expressionManager.getValue('aa') || 0;
                        currentVrm.expressionManager.setValue('aa', currentMouth + (mouthOpen - currentMouth) * 15 * delta);
                    }
                } else {
                    // Desactivar todos los blendshapes vocales cuando no habla
                    const vowelBlendshapes = ['aa', 'ih', 'ou', 'e', 'oh'];
                    for (const bs of vowelBlendshapes) {
                        currentVrm.expressionManager.setValue(bs, 0);
                    }
                }
            }
            renderer.render(scene, camera);
        }
        animate();

        window.setAvatarState = (state) => {
            window.avatarState = state;
            if(!currentVrm) {
                console.warn("🎭 [WEB] setAvatarState: currentVrm es null, ignorando");
                return;
            }
            clearTimeout(hideTimeout);
            currentVrm.expressionManager.setValue('neutral', 0);
            currentVrm.expressionManager.setValue('happy', 0);

            if(state === "thinking") {
                avatarTargetY = avatarBaseY;
                currentVrm.expressionManager.setValue('neutral', 1.0);
            } else if(state === "speaking") {
                avatarTargetY = avatarBaseY;
                currentVrm.expressionManager.setValue('happy', 0.8);
            } else if(state === "hidden") {
                avatarTargetY = avatarBaseY - 5;
            } else if(state === "idle") {
                avatarTargetY = avatarBaseY;
                currentVrm.expressionManager.setValue('neutral', 0.2);
                // Timer de ocultamiento eliminado - ahora controlado desde Python
            }
        };

        window.apuntarFalso = () => {
            if(!currentVrm) return;
            const rightArm = currentVrm.humanoid.getNormalizedBoneNode('rightUpperArm');
            if(rightArm) {
                rightArm.rotation.z = -Math.PI / 2.5; 
                rightArm.rotation.x = Math.PI / 6;    
            }
        };
    </script>
</body>
